name: release

on:
  push:
    branches:
      - main
    paths:
      - charts/**

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "Kymelio"
          git config user.email "simon.meier@kymelio.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.15.4

      - name: Ensure gh-pages branch exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            work="$(mktemp -d)"
            git -C "$work" init -q
            git -C "$work" config user.name "Kymelio"
            git -C "$work" config user.email "simon.meier@kymelio.com"
            git -C "$work" checkout -q -b gh-pages
            printf 'apiVersion: v1\nentries: {}\n' > "$work/index.yaml"
            git -C "$work" add index.yaml
            git -C "$work" commit -q -m "Initialize chart repository index"
            git -C "$work" push -q \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          fi

      - name: Run chart-releaser
        id: releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: charts
          skip_existing: true

      - name: Push released charts to the OCI registry
        if: steps.releaser.outputs.changed_charts != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" --password-stdin
          dest="${RUNNER_TEMP}/oci-packages"
          mkdir -p "$dest"
          IFS=',' read -ra charts <<< "${{ steps.releaser.outputs.changed_charts }}"
          for chart_dir in "${charts[@]}"; do
            [ -f "${chart_dir}/Chart.yaml" ] || continue
            package="$(helm package "$chart_dir" --destination "$dest" | awk '{print $NF}')"
            helm push "$package" oci://ghcr.io/kymeliodev/kymelio-helm
          done
