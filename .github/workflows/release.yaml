name: release

on:
  push:
    branches:
      - main
    paths:
      - charts/**

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "Kymelio"
          git config user.email "simon.meier@kymelio.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.15.4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          charts_dir: charts

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Push charts to OCI registry
        run: |
          for chart_dir in charts/*/; do
            [ -f "${chart_dir}Chart.yaml" ] || continue
            name=$(helm show chart "$chart_dir" | awk '/^name:/ {print $2}')
            version=$(helm show chart "$chart_dir" | awk '/^version:/ {print $2}')
            tag="${name}-${version}"
            if git tag --list | grep -qx "$tag"; then
              package=$(helm package "$chart_dir" --destination .cr-release-packages | awk '{print $NF}')
              helm push "$package" oci://ghcr.io/kymeliodev/kymelio-helm
            fi
          done
