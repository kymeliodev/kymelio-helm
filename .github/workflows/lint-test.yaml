name: lint-test

on:
  pull_request:
    paths:
      - charts/**
      - .github/workflows/lint-test.yaml
      - .github/ct.yaml
      - .github/install-allowlist.txt

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: v3.15.4

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Detect changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config .github/ct.yaml)
          if [ -n "$changed" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing lint
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config .github/ct.yaml

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.10.0

      - name: Run chart-testing install
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          # Lint covers every chart. Install only validates charts on the
          # allowlist, since operators and clustered systems cannot come up
          # standalone in an ephemeral kind cluster.
          excluded=""
          while IFS= read -r dir; do
            name="$(basename "$dir")"
            if ! grep -qxF "$name" .github/install-allowlist.txt; then
              excluded="${excluded}${excluded:+,}${name}"
            fi
          done < <(find charts -mindepth 1 -maxdepth 1 -type d | sort)
          cp .github/ct.yaml ct-install.yaml
          echo "excluded-charts: [${excluded}]" >> ct-install.yaml
          ct install --config ct-install.yaml
