apiVersion: v1
kind: Service
metadata:
  name: {{ include "forgejo.fullname" . }}
  labels:
    {{- include "forgejo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.portName }}
      protocol: TCP
      name: {{ .Values.service.portName }}
    {{- if .Values.service.ssh.enabled }}
    - port: {{ .Values.service.ssh.port }}
      targetPort: {{ .Values.service.ssh.portName }}
      protocol: TCP
      name: {{ .Values.service.ssh.portName }}
    {{- end }}
  selector:
    {{- include "forgejo.selectorLabels" . | nindent 4 }}
