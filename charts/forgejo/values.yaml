# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: codeberg.org/forgejo/forgejo
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Initial administrator account created on first start through the install API.
# Leave create disabled to configure the admin manually after the first boot.
admin:
  create: false
  username: forgejo_admin
  email: admin@example.com
  # Admin password. A random password is generated when left empty.
  password: ""
  # Use an existing Secret instead of managing the password in this chart.
  existingSecret: ""
  secretKeys:
    passwordKey: admin-password

# Public domain advertised by Forgejo. Used to build clone and web URLs.
domain: forgejo.example.com

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload. The primary port serves HTTP. A second port
# exposes the Git SSH endpoint.
service:
  type: ClusterIP
  port: 3000
  portName: http
  ssh:
    enabled: true
    port: 22
    portName: ssh

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  # Expose the built in Prometheus endpoint on the HTTP port at /metrics. This
  # sets FORGEJO__metrics__ENABLED=true so Forgejo serves /metrics itself.
  enabled: false
  # Restrict /metrics to clients presenting this bearer token. Empty leaves the
  # endpoint open to anyone able to reach the HTTP port.
  token: ""
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # Path scraped by Prometheus. Forgejo serves metrics at /metrics.
    path: /metrics

# Extra environment variables passed to the container. The defaults configure
# the embedded SQLite database and the public domain. Override the database
# variables to point Forgejo at an external PostgreSQL or MySQL server.
extraEnv:
  - name: FORGEJO__database__DB_TYPE
    value: sqlite3
  - name: FORGEJO__server__DOMAIN
    value: forgejo.example.com

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /data
