{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "keda.fullname" . }}
  labels:
    {{- include "keda.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - keda.sh
    resources:
      - scaledobjects
      - scaledobjects/status
      - scaledobjects/finalizers
      - scaledjobs
      - scaledjobs/status
      - scaledjobs/finalizers
      - triggerauthentications
      - triggerauthentications/status
      - clustertriggerauthentications
      - clustertriggerauthentications/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - external
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "keda.fullname" . }}
  labels:
    {{- include "keda.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "keda.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "keda.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
