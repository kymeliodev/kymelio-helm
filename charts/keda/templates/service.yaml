apiVersion: v1
kind: Service
metadata:
  name: {{ include "keda.fullname" . }}
  labels:
    {{- include "keda.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.portName }}
      protocol: TCP
      name: {{ .Values.service.portName }}
    - port: {{ .Values.service.healthPort }}
      targetPort: {{ .Values.service.healthPortName }}
      protocol: TCP
      name: {{ .Values.service.healthPortName }}
  selector:
    {{- include "keda.selectorLabels" . | nindent 4 }}
