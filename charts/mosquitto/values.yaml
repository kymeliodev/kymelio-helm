# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/library/eclipse-mosquitto
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the mosquitto user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1883
  runAsGroup: 1883
  fsGroup: 1883
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the MQTT listener. When metrics.enabled is set the exporter
# port is added.
service:
  type: ClusterIP
  port: 1883
  portName: mqtt
  metrics:
    port: 9234
    portName: metrics

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# Mosquitto has no native Prometheus endpoint, it publishes broker statistics on
# the $SYS topics instead. The community sapcc/mosquitto-exporter sidecar
# subscribes to those topics over MQTT and re-exposes them as Prometheus metrics
# on its own port (9234). When enabled this chart adds the sidecar, publishes its
# port and wires the ServiceMonitor to it.
metrics:
  enabled: false
  # Path the exporter serves metrics on.
  path: /metrics
  # Exporter sidecar image.
  image:
    repository: sapcc/mosquitto-exporter
    tag: "0.8.0"
    pullPolicy: IfNotPresent
  resources: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /mosquitto/data

# Mosquitto broker configuration rendered into the mounted mosquitto.conf.
mosquittoConf: |-
  listener 1883
  allow_anonymous true
  persistence true
  persistence_location /mosquitto/data/

# Extra command line arguments appended to the container entrypoint.
extraArgs: []
# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []
# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. This is mounted alongside the broker mosquitto.conf
# under a dedicated extra-config volume to avoid colliding with it.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""
# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []
# Additional init containers and sidecar containers.
initContainers: []
sidecars: []
# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
