{{- if and .Values.configuration (not .Values.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mosquitto.fullname" . }}-app-config
  labels:
    {{- include "mosquitto.labels" . | nindent 4 }}
data:
  {{ .Values.configFileName }}: |
    {{- .Values.configuration | nindent 4 }}
{{- end }}
