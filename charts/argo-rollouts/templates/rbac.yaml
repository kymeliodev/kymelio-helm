{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "argo-rollouts.fullname" . }}
  labels:
    {{- include "argo-rollouts.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - rollouts
      - rollouts/status
      - rollouts/finalizers
      - rollouts/scale
      - analysisruns
      - analysisruns/finalizers
      - analysistemplates
      - clusteranalysistemplates
      - experiments
      - experiments/finalizers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - replicasets
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - services
      - pods
      - configmaps
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "argo-rollouts.fullname" . }}
  labels:
    {{- include "argo-rollouts.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "argo-rollouts.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "argo-rollouts.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
