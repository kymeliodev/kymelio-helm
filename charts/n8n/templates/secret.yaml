{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.secretKeys.encryptionKeyKey }}: {{ include "n8n.encryptionKey" . | b64enc | quote }}
{{- end }}
