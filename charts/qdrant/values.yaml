# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/qdrant/qdrant
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Optional API key authentication.
auth:
  # Require an API key to access the service. Disabled by default.
  enabled: false
  # API key used when auth is enabled. A random key is generated when left empty.
  apiKey: ""
  # Use an existing Secret instead of managing the key in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the API key.
    apiKeyKey: api-key

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the qdrant user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  # Primary HTTP REST API endpoint.
  http:
    port: 6333
    portName: http
  # gRPC API endpoint.
  grpc:
    port: 6334
    portName: grpc
  # Ports exposed by the Service and the StatefulSet.
  exposedPorts:
    - name: http
      port: 6333
    - name: grpc
      port: 6334

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# Qdrant serves Prometheus metrics natively at /metrics on the HTTP port
# (service.http.port, default 6333). No exporter sidecar is required.
metrics:
  # Annotate the pod with Prometheus scrape hints for the built in endpoint.
  enabled: false
  # Path of the built in Prometheus endpoint on the HTTP port.
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS for the REST and gRPC APIs. When enabled, the chart sets
# service.enable_tls and the tls cert and key paths in the Qdrant config and
# mounts the certificate Secret. Provide a Secret holding the certificate,
# private key and optional CA certificate.
tls:
  enabled: false
  # Secret containing the certificate, key and optional CA certificate.
  existingSecret: ""
  certFilename: tls.crt
  keyFilename: tls.key
  # Optional CA certificate file name inside the Secret. Leave empty to skip.
  caFilename: ""
  # Mount path for the TLS material inside the container.
  mountPath: /qdrant/tls

# Extra environment variables passed to the container.
extraEnv: []

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for the native Qdrant config.yaml, which
# Qdrant reads from /qdrant/config. Values here override the image defaults.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: config.yaml
# Mount path for the configuration. Qdrant loads config files from /qdrant/config.
configMountPath: /qdrant/config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /qdrant/storage

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
