# Number of replicas. This chart deploys a single instance.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/library/mysql
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Database authentication and bootstrap settings.
auth:
  # Application user created on first start.
  username: mysql
  # Database created on first start.
  database: mysql
  # Root password. A random password is generated when left empty.
  rootPassword: ""
  # Application user password. A random password is generated when left empty.
  password: ""
  # Use an existing Secret instead of managing credentials in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the root password.
    rootPasswordKey: mysql-root-password
    # Key inside the Secret that holds the application user password.
    passwordKey: mysql-password

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the mysql user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing MySQL.
service:
  type: ClusterIP
  port: 3306
  portName: mysql

# Ingress is not applicable to a TCP database and stays disabled.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Autoscaling is not supported for a single instance and stays disabled.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  # Run a mysqld_exporter sidecar that exposes metrics on metrics.port.
  enabled: false
  image:
    repository: quay.io/prometheus/mysqld-exporter
    tag: v0.15.1
    pullPolicy: IfNotPresent
  port: 9104
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server configuration rendered into a my.cnf. When set it is rendered into a
# ConfigMap and mounted at /etc/mysql/conf.d/custom.cnf. Use the [mysqld] section
# for server tuning. TLS is configured here as well (ssl-cert, ssl-key, etc.).
# Example: |
#   [mysqld]
#   max_connections=200
mysqlConfiguration: ""

# Initialization scripts run on first start. Map of filename to script content,
# mounted into /docker-entrypoint-initdb.d and executed once on an empty data dir.
initdbScripts: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Persistent storage for the database directory.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/lib/mysql

# Image used by the helm test connection check. Defaults to the server image.
tests:
  image: docker.io/library/mysql:8.4
