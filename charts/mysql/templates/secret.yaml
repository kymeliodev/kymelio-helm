{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mysql.fullname" . }}
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.secretKeys.rootPasswordKey }}: {{ include "mysql.rootPassword" . | b64enc | quote }}
  {{ .Values.auth.secretKeys.passwordKey }}: {{ include "mysql.password" . | b64enc | quote }}
{{- end }}
