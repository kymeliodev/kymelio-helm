# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/library/cassandra
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 9042
  portName: cql
  # JMX port used by nodetool and the metrics exporter to read MBeans.
  jmxPort: 7199

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1
    memory: 2Gi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# Cassandra has no built-in Prometheus endpoint, so metrics are exposed through a
# jmx_exporter sidecar that reads MBeans over the local JMX port and serves them
# on metrics.port at the /metrics path.
metrics:
  enabled: false
  image:
    repository: docker.io/sscaling/jmx-prometheus-exporter
    tag: "0.20.0"
    pullPolicy: IfNotPresent
  # Port the exporter sidecar listens on.
  port: 5556
  # Exporter configuration rendered into a ConfigMap and passed to the sidecar.
  # Override to scrape additional MBeans or relabel metrics.
  config:
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: ".*"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS for client (CQL) connections. When enabled the settings are
# rendered into the mounted cassandra.yaml fragment and the certificate Secret is
# mounted read only. Provide a Secret holding the keystore and truststore.
tls:
  enabled: false
  # Secret containing the keystore and truststore files.
  existingSecret: ""
  # Mount path for the TLS material inside the container.
  mountPath: /opt/cassandra/certs
  keystoreFilename: keystore.jks
  truststoreFilename: truststore.jks
  # Passwords for the keystore and truststore.
  keystorePassword: ""
  truststorePassword: ""

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Cassandra bootstrap settings.
cassandra:
  clusterName: cassandra-cluster
  datacenter: datacenter1
  endpointSnitch: GossipingPropertyFileSnitch
  # Native cassandra.yaml tuning. When set (or when tls.enabled is true) the
  # fragment is rendered into a ConfigMap and copied over the packaged
  # cassandra.yaml at startup. Use this for server settings such as
  # concurrent_reads, compaction throughput or client_encryption_options.
  # Example: |
  #   concurrent_reads: 64
  #   concurrent_writes: 64
  configFragment: ""
  # File name used for the rendered cassandra.yaml fragment.
  configFragmentFileName: cassandra.yaml
  # Mount path for the rendered cassandra.yaml fragment.
  configFragmentMountPath: /etc/cassandra-extra

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/lib/cassandra
