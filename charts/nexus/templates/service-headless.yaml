apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus.fullname" . }}-headless
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.portName }}
      protocol: TCP
      name: {{ .Values.service.portName }}
  selector:
    {{- include "nexus.selectorLabels" . | nindent 4 }}
