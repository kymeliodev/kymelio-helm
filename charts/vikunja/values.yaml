# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/vikunja/vikunja
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Vikunja application settings.
vikunja:
  # Public URL the frontend and API are served from. Must end with a slash.
  publicUrl: http://localhost:3456/

# JWT signing secret. Generated on first install and reused from the release
# Secret on upgrade when left unmanaged.
auth:
  # Provide a fixed JWT secret. A random value is generated when left empty.
  jwtSecret: ""
  # Use an existing Secret instead of managing the secret in this chart.
  existingSecret: ""
  secretKeys:
    # Key holding the VIKUNJA_SERVICE_JWTSECRET value.
    jwtSecretKey: jwt-secret

# Database backend. By default Vikunja runs standalone on a SQLite file stored
# on the persistent volume, so no external database is required.
database:
  # One of sqlite, postgres or mysql.
  type: sqlite

# External database connection. Used only when database.type is not sqlite.
# This chart does not bundle a database. Provide a reachable instance.
externalDatabase:
  # Host and optional port, for example postgresql:5432.
  host: postgresql:5432
  # Database name.
  database: vikunja
  # Database user.
  user: vikunja
  # Database password.
  password: vikunja

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 3456
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  # Enable the built in Vikunja metrics endpoint. This sets
  # VIKUNJA_SERVICE_ENABLEMETRICS=true and exposes Prometheus metrics on the API
  # port at /metrics (also reachable at /api/v1/metrics). Enabling metrics with
  # more than one replica requires a shared Redis keyvalue store.
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []
# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /app/vikunja/files
