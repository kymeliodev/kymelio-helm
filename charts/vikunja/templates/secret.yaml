{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vikunja.fullname" . }}
  labels:
    {{- include "vikunja.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.secretKeys.jwtSecretKey }}: {{ include "vikunja.jwtSecret" . | b64enc | quote }}
{{- end }}
