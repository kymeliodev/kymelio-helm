# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/opencloudeu/opencloud-rolling
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Initial administrator account created on first start.
auth:
  # Administrator user name.
  adminUser: admin
  # Administrator password. A random password is generated when left empty.
  adminPassword: ""
  # Use an existing Secret instead of managing credentials in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the admin password.
    passwordKey: admin-password

# Run with TLS verification disabled inside the cluster. OpenCloud terminates
# TLS at an external ingress, so OC_INSECURE is set to true by default.
insecure: true

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the uid shipped in the OpenCloud image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 9200
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# OpenCloud (oCIS) exposes Prometheus metrics on a debug endpoint that defaults
# to 127.0.0.1:9205 and is therefore not reachable from outside the pod. When
# enabled the chart binds the proxy debug endpoint to 0.0.0.0 via
# PROXY_DEBUG_ADDR, publishes it as the named metrics port and scrapes it at
# metrics.path. See the README.
metrics:
  enabled: false
  # Container port the debug/metrics endpoint binds to when enabled.
  port: 9205
  # HTTP path of the Prometheus metrics endpoint on the debug port.
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []
# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/lib/opencloud

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
