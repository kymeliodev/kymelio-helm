# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: quay.io/thanos/thanos
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 10902
  portName: http
  # Additional ports exposed by the Service and the container.
  extraPorts:
    - name: grpc
      port: 10901
      targetPort: 10901
      protocol: TCP

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []

# Entrypoint command for the Thanos Querier.
command:
  - thanos

# Command line arguments. The defaults run the Thanos Querier and expose its
# HTTP and gRPC endpoints. Add --store flags to point at Thanos stores,
# sidecars or receivers.
args:
  - query
  - "--http-address=0.0.0.0:10902"
  - "--grpc-address=0.0.0.0:10901"

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36
