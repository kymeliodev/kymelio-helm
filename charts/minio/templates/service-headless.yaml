apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio.fullname" . }}-headless
  labels:
    {{- include "minio.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.api.port }}
      targetPort: {{ .Values.service.api.portName }}
      protocol: TCP
      name: {{ .Values.service.api.portName }}
    - port: {{ .Values.service.console.port }}
      targetPort: {{ .Values.service.console.portName }}
      protocol: TCP
      name: {{ .Values.service.console.portName }}
  selector:
    {{- include "minio.selectorLabels" . | nindent 4 }}
