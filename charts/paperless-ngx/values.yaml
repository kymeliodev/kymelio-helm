# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: ghcr.io/paperless-ngx/paperless-ngx
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Paperless-ngx application settings.
paperless:
  # Public URL Paperless-ngx is served from. Required when behind a proxy.
  url: http://localhost:8000

# Application secret. PAPERLESS_SECRET_KEY is generated on first install and
# reused from the release Secret on upgrade when left unmanaged.
auth:
  # Provide a fixed secret key. A random value is generated when left empty.
  secretKey: ""
  # Use an existing Secret instead of managing the secret in this chart.
  existingSecret: ""
  secretKeys:
    # Key holding the PAPERLESS_SECRET_KEY value.
    secretKeyKey: secret-key

# External Redis connection. Paperless-ngx requires Redis for its task queue.
# This chart does not bundle Redis. Provide a reachable instance and set the URL.
externalRedis:
  # Connection string passed as PAPERLESS_REDIS, for example redis://redis:6379
  url: redis://redis:6379

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 8000
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
#
# Paperless-ngx has no native Prometheus endpoint. To collect metrics you must
# run the community exporter github.com/hansmi/prometheus-paperless-exporter,
# which reads the Paperless REST API and exposes /metrics on its own port. Add
# it through the sidecars value (or as a separate Deployment) and point
# metrics.port at the exporter port before enabling the ServiceMonitor.
metrics:
  # When true the ServiceMonitor scrapes metrics.port at metrics.path instead of
  # the application HTTP port. This requires the exporter described above; the
  # Paperless container itself serves no metrics.
  enabled: false
  # Port the exporter listens on. The hansmi exporter defaults to 8081.
  port: 8081
  # Path the exporter serves metrics on.
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []
# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /usr/src/paperless/data

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
