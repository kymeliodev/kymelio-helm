apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "airlock-microgateway.fullname" . }}-test-connection"
  labels:
    {{- include "airlock-microgateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    {{- if not .Values.openShift.enabled }}
    runAsUser: 65534
    {{- end }}
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test-connection
      image: {{ .Values.tests.image }}
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command: ["sh", "-c"]
      args:
        - nc -z -w5 {{ include "airlock-microgateway.fullname" . }} {{ .Values.service.port }}
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
