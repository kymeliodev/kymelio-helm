# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/library/solr
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. 8983 is the solr user in the official image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 8983
  runAsGroup: 8983
  fsGroup: 8983
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Solr writes to /var/solr, so the root filesystem cannot be immutable.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 8983
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# Solr has no Prometheus endpoint on its HTTP port, but the image bundles the
# Solr Prometheus exporter (bin/solr-exporter). Enabling this runs it as a
# sidecar built from the same image, scraping the local node and exposing
# metrics on metrics.port at /metrics.
metrics:
  enabled: false
  # Port the bundled exporter listens on and exposes through the Service.
  port: 8989
  # Solr base URL the exporter scrapes.
  baseUrl: http://localhost:8983/solr
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 256Mi
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Java system properties and options appended to SOLR_OPTS. This is the native
# Solr tuning mechanism alongside the generic configuration surface.
# Example: "-Dsolr.autoSoftCommit.maxTime=3000"
solrOpts: ""

# Server side TLS. Solr enables HTTPS through SOLR_SSL_* settings backed by a
# Java keystore. When enabled, the named Secret is mounted and the chart wires
# the keystore and truststore through the SOLR_SSL_* environment variables.
tls:
  enabled: false
  # Secret containing the keystore and truststore.
  existingSecret: ""
  # Keystore and truststore file names inside the Secret (PKCS12 format).
  keyStoreFilename: keystore.p12
  trustStoreFilename: truststore.p12
  # Secret holding the keystore and truststore passwords.
  passwordSecret: ""
  keyStorePasswordKey: keystore-password
  trustStorePasswordKey: truststore-password
  # Mount path for the keystore Secret inside the container.
  mountPath: /var/solr/certs

# Extra environment variables passed to the container.
extraEnv: []

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/solr

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
