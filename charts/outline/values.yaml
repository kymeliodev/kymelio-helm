# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/outlinewiki/outline
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Outline application settings.
outline:
  # Public URL Outline is served from. Must match the address users reach.
  url: http://localhost:3000

# Application secrets. SECRET_KEY and UTILS_SECRET are generated on first
# install and reused from the release Secret on upgrade when left unmanaged.
auth:
  # Use an existing Secret instead of managing secrets in this chart. It must
  # contain the keys named under secretKeys.
  existingSecret: ""
  secretKeys:
    # Key holding the Outline SECRET_KEY value.
    secretKey: secret-key
    # Key holding the Outline UTILS_SECRET value.
    utilsSecretKey: utils-secret

# External PostgreSQL connection. Outline requires a PostgreSQL database. This
# chart does not bundle one. Provide a reachable instance and set the URL.
externalDatabase:
  # Full connection string, for example:
  # postgres://outline:password@postgresql:5432/outline
  url: postgres://outline:outline@postgresql:5432/outline
  # PostgreSQL SSL mode passed as PGSSLMODE. Use disable, require or verify-full.
  sslMode: disable

# External Redis connection. Outline requires Redis for queues and websockets.
# This chart does not bundle one. Provide a reachable instance and set the URL.
externalRedis:
  # Full connection string, for example: redis://redis:6379
  url: redis://redis:6379

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 3000
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# Outline does not ship a built in Prometheus endpoint. Setting metrics.enabled
# is a marker only; no metrics port is exposed by the Outline image. Enabling
# serviceMonitor creates a ServiceMonitor that scrapes the HTTP service port, so
# you must run a sidecar or external exporter that publishes Outline metrics on
# that port for the ServiceMonitor to collect anything. See the README.
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []
# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36
