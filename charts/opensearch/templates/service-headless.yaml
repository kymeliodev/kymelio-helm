apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensearch.fullname" . }}-headless
  labels:
    {{- include "opensearch.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.http.port }}
      targetPort: {{ .Values.service.http.portName }}
      protocol: TCP
      name: {{ .Values.service.http.portName }}
    - port: {{ .Values.service.transport.port }}
      targetPort: {{ .Values.service.transport.portName }}
      protocol: TCP
      name: {{ .Values.service.transport.portName }}
  selector:
    {{- include "opensearch.selectorLabels" . | nindent 4 }}
