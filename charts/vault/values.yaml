# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/hashicorp/vault
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Development mode runs an in-memory server that is automatically unsealed and
# pre-initialised. It is intended for evaluation and testing only. Disable it
# and supply a production server configuration before any real use.
devMode:
  enabled: true
  # Arguments passed to the vault binary in development mode.
  args:
    - server
    - -dev
    - -dev-listen-address=0.0.0.0:8200

# Root token used by the development server. A random value is generated when
# left empty.
auth:
  # Development root token. A random token is generated when empty.
  rootToken: ""
  # Use an existing Secret instead of managing the token in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the root token.
    rootTokenKey: root-token

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the uid shipped in the Vault image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 8200
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36
