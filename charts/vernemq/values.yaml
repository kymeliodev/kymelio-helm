# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/vernemq/vernemq
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10000
  runAsGroup: 10000
  fsGroup: 10000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload. The MQTT listener and EPMD are published. When
# metrics.enabled is set the HTTP status/metrics port is added.
service:
  type: ClusterIP
  mqtt:
    port: 1883
    portName: mqtt
  epmd:
    port: 4369
    portName: epmd
  metrics:
    port: 8888
    portName: metrics

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# VerneMQ exposes a native Prometheus endpoint on its HTTP status listener
# (port 8888, path /metrics), so no exporter sidecar is required. The HTTP
# listener binds to localhost by default, so enabling metrics rebinds it to
# 0.0.0.0 so Prometheus can reach it, publishes the port and wires the
# ServiceMonitor to it.
metrics:
  enabled: false
  # Path the native Prometheus endpoint is served on.
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS for the MQTT listener. VerneMQ configures the SSL listener
# natively through DOCKER_VERNEMQ_LISTENER__SSL__DEFAULT settings. When enabled
# this chart mounts the certificate Secret, wires those settings and publishes
# the SSL listener on tls.mqttsPort (8883).
tls:
  enabled: false
  # Secret containing ca.crt, tls.crt and tls.key.
  existingSecret: ""
  caFilename: ca.crt
  certFilename: tls.crt
  keyFilename: tls.key
  # Directory the certificate files are mounted into.
  mountPath: /vernemq/certs
  # Require and verify client certificates (mutual TLS).
  requireCertificate: false
  # SSL MQTT listener port published when TLS is enabled.
  mqttsPort: 8883
  mqttsPortName: mqtts

# Native VerneMQ settings applied as DOCKER_VERNEMQ_ environment variables. Keys
# are the vernemq.conf option names, for example
# { max_online_messages: "10000", "allow_register_during_netsplit": "on" }. Dots
# become double underscores and the key is uppercased.
vernemqConf: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /vernemq/data
