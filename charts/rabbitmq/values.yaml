# Number of replicas. This chart deploys a single node.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/library/rabbitmq
  pullPolicy: IfNotPresent
  # The management variant is used so the management UI and HTTP API are
  # available. Keep the management suffix when overriding this tag.
  tag: "3.13-management"

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Broker authentication settings.
auth:
  # Default user created on first start.
  username: user
  # Default user password. A random password is generated when left empty.
  password: ""
  # Erlang cookie shared by nodes. A random value is generated when left empty.
  erlangCookie: ""
  # Use an existing Secret instead of managing credentials in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the password.
    passwordKey: rabbitmq-password
    # Key inside the Secret that holds the Erlang cookie.
    erlangCookieKey: rabbitmq-erlang-cookie

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the rabbitmq user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the broker. AMQP and the management UI are published. When
# metrics.enabled is set the Prometheus port is published as well.
service:
  type: ClusterIP
  amqp:
    port: 5672
    portName: amqp
  management:
    port: 15672
    portName: management
  metrics:
    port: 15692
    portName: metrics

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# RabbitMQ ships the rabbitmq_prometheus plugin, which exposes all broker
# metrics in Prometheus text format on a dedicated port (15692, path /metrics).
# Enabling this renders an enabled_plugins file that turns the plugin on
# alongside the management plugin, publishes the metrics port and wires the
# ServiceMonitor to it. No exporter sidecar is required.
metrics:
  enabled: false
  # Path the Prometheus plugin serves metrics on.
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS for the AMQP listener. RabbitMQ enables TLS through its native
# configuration (ssl_options in rabbitmq.conf). When enabled this chart mounts
# the certificate Secret and appends the matching ssl_options to the rendered
# rabbitmq.conf so the broker serves AMQPS on amqpsPort.
tls:
  enabled: false
  # Secret containing ca.crt, tls.crt and tls.key.
  existingSecret: ""
  caFilename: ca.crt
  certFilename: tls.crt
  keyFilename: tls.key
  # Directory the certificate files are mounted into.
  mountPath: /etc/rabbitmq/certs
  # Require and verify client certificates (mutual TLS).
  verifyPeer: false
  # AMQPS listener port published when TLS is enabled.
  amqpsPort: 5671
  amqpsPortName: amqps

# Native RabbitMQ configuration rendered into rabbitmq.conf and mounted at
# /etc/rabbitmq/rabbitmq.conf. Use this for sysctl style broker tuning, for
# example { vm_memory_high_watermark.relative: "0.6", channel_max: "2048" }.
rabbitmqConf: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the broker data directory.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/lib/rabbitmq
