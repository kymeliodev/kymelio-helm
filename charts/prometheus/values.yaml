# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/prom/prometheus
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 9090
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []

# Command line arguments passed to Prometheus.
args:
  - "--config.file=/etc/prometheus/prometheus.yml"
  - "--storage.tsdb.path=/prometheus"

# Prometheus configuration rendered into a ConfigMap and mounted at
# /etc/prometheus/prometheus.yml. A minimal global scrape config that scrapes
# the Prometheus instance itself.
config: |
  global:
    scrape_interval: 15s
    evaluation_interval: 15s
  scrape_configs:
    - job_name: prometheus
      static_configs:
        - targets:
            - localhost:9090

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /data
