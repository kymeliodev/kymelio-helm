apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "surrealdb.fullname" . }}-test-connection"
  labels:
    {{- include "surrealdb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    {{- if not .Values.openShift.enabled }}
    runAsUser: 1000
    {{- end }}
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test-connection
      image: {{ .Values.tests.image }}
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - /surreal
        - isready
        - --endpoint
        - http://{{ include "surrealdb.fullname" . }}:{{ .Values.service.port }}
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
