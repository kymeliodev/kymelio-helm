# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/surrealdb/surrealdb
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Authentication and bootstrap settings.
auth:
  # Initial root user created on first start.
  username: root
  # Root password. A random password is generated when left empty.
  password: ""
  # Use an existing Secret instead of managing credentials in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the password.
    passwordKey: surrealdb-password

# Service account used by the workload.
serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the surreal user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing SurrealDB.
service:
  type: ClusterIP
  port: 8000
  portName: http

# Ingress is not applicable by default and stays disabled.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Autoscaling is not supported for a single instance and stays disabled.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# SurrealDB exposes Prometheus metrics on the main HTTP port at the /metrics path
# when telemetry is enabled. Enabling this sets SURREAL_TELEMETRY_PROVIDER and
# points the ServiceMonitor at /metrics on the existing service port.
metrics:
  enabled: false
  # Path the metrics are served at on the HTTP port.
  path: /metrics
  # Telemetry provider passed to the server (SURREAL_TELEMETRY_PROVIDER).
  telemetryProvider: otlp
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS for client HTTP connections. When enabled the certificate Secret
# is mounted read only and --web-crt / --web-key are passed to surreal start.
tls:
  enabled: false
  # Secret containing the certificate and key files.
  existingSecret: ""
  # Mount path for the TLS material inside the container.
  mountPath: /tls
  certFilename: tls.crt
  keyFilename: tls.key

# Extra environment variables passed to the container.
extraEnv: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: docker.io/surrealdb/surrealdb:v2.0

# Persistent storage for the data directory.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /data

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
