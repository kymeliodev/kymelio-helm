apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opendesk.fullname" . }}
  labels:
    {{- include "opendesk.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen {{ .Values.service.port }};
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>{{ .Values.portal.title }}</title>
      </head>
      <body>
        <h1>{{ .Values.portal.title }}</h1>
        <p>{{ .Values.portal.message }}</p>
      </body>
    </html>
{{- if .Values.config }}
  {{- toYaml .Values.config | nindent 2 }}
{{- end }}
