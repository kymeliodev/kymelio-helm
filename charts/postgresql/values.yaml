# Number of replicas. This chart deploys a single primary instance.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/library/postgres
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Database authentication and bootstrap settings.
auth:
  # Superuser name created on first start.
  username: postgres
  # Database created on first start.
  database: postgres
  # Superuser password. A random password is generated when left empty.
  password: ""
  # Use an existing Secret instead of managing credentials in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the password.
    passwordKey: postgres-password

# Service account used by the workload.
serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the postgres user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing PostgreSQL.
service:
  type: ClusterIP
  port: 5432
  portName: postgresql

# Ingress is not applicable to a TCP database and stays disabled.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Autoscaling is not supported for a single primary and stays disabled.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  # Run a postgres_exporter sidecar that exposes metrics on metrics.port.
  enabled: false
  image:
    repository: quay.io/prometheuscommunity/postgres-exporter
    tag: v0.15.0
    pullPolicy: IfNotPresent
  port: 9187
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS. Provide a Secret with the certificate and private key.
tls:
  enabled: false
  # Secret containing the certificate and key files.
  existingSecret: ""
  certFilename: tls.crt
  keyFilename: tls.key

# Server parameters applied with -c key=value on startup (postgresql.conf tuning).
# Example: { max_connections: "200", shared_buffers: "256MB" }
parameters: {}

# Initialization scripts run on first start. Map of filename to script content,
# mounted into /docker-entrypoint-initdb.d and executed once on an empty data dir.
initdbScripts: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Persistent storage for the database directory.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/lib/postgresql/data

# Image used by the helm test connection check. Defaults to the server image.
tests:
  image: docker.io/library/postgres:16.4
