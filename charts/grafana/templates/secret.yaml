{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grafana.fullname" . }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.secretKeys.passwordKey }}: {{ include "grafana.adminPassword" . | b64enc | quote }}
{{- end }}
