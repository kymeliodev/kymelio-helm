# Number of replicas. This chart deploys a single insecure node.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/cockroachdb/cockroach
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the cockroach user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the SQL and HTTP endpoints.
service:
  type: ClusterIP
  ports:
    sql:
      port: 26257
      name: sql
    http:
      port: 8080
      name: http

# Ingress is not applicable to a SQL database and stays disabled.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Autoscaling is not supported for a single node and stays disabled.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# CockroachDB exposes Prometheus metrics natively on the HTTP port at the
# /_status/vars path, so no exporter sidecar is required.
metrics:
  # Expose a dedicated metrics Service port that targets the HTTP port and
  # scrape /_status/vars. The HTTP container port is always present, so leaving
  # this disabled keeps the default render unchanged.
  enabled: false
  # Service port published for scraping. It targets the HTTP container port,
  # where CockroachDB serves the Prometheus endpoint.
  port: 8081
  # Path the Prometheus endpoint is served on.
  path: /_status/vars
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS. When enabled the node starts in secure mode with --certs-dir
# pointing at the mounted Secret instead of --insecure. The Secret must contain
# the CockroachDB node certificate files (ca.crt, node.crt, node.key).
tls:
  enabled: false
  # Secret containing the certificate directory contents.
  existingSecret: ""
  # Directory the certificate files are mounted into and passed to --certs-dir.
  mountPath: /cockroach/certs

# Start flags applied as --key=value arguments to start-single-node. Use this
# for native server tuning, for example { max-sql-memory: "25%", cache: "25%" }.
parameters: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Persistent storage for the data directory.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /cockroach/cockroach-data

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
