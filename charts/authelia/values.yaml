# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/authelia/authelia
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Secrets used by Authelia at runtime. Random values are generated when left
# empty and reused across upgrades through the release Secret.
auth:
  # JWT secret used for identity verification email tokens.
  jwtSecret: ""
  # Session encryption secret.
  sessionSecret: ""
  # Storage encryption key. Must be at least 20 characters.
  storageEncryptionKey: ""
  # Use an existing Secret instead of managing the values in this chart.
  existingSecret: ""
  secretKeys:
    jwtKey: jwt-secret
    sessionKey: session-secret
    storageKey: storage-encryption-key

# Authelia server configuration. Rendered into a ConfigMap and mounted at
# /config/configuration.yml. The defaults provide a minimal single-instance
# setup using a file authentication backend and a local SQLite database.
authelia:
  theme: light
  log:
    level: info
  server:
    address: tcp://0.0.0.0:9091
  authentication_backend:
    file:
      path: /config/users_database.yml
  access_control:
    default_policy: one_factor
  session:
    name: authelia_session
    cookies:
      - domain: example.com
        authelia_url: https://auth.example.com
  regulation:
    max_retries: 3
    find_time: 2m
    ban_time: 5m
  storage:
    local:
      path: /config/db.sqlite3
  notifier:
    filesystem:
      filename: /config/notification.txt

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the uid shipped in the Authelia image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 9091
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  # Enable the Authelia telemetry metrics exporter. Authelia serves Prometheus
  # metrics at /metrics on a dedicated port (9959), enabled through the
  # telemetry.metrics section of its configuration. Enabling this injects that
  # section and adds the port to the container and Service.
  enabled: false
  # Port serving the metrics endpoint.
  port: 9959
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # Path of the Prometheus metrics endpoint.
    path: /metrics

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
