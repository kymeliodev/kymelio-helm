# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/library/influxdb
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Initial setup credentials and bootstrap settings.
auth:
  # Initial admin user created on first start.
  username: admin
  # Initial organization created on first start.
  org: primary
  # Initial bucket created on first start.
  bucket: default
  # Admin password. A random password is generated when left empty.
  password: ""
  # Use an existing Secret instead of managing credentials in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the password.
    passwordKey: influxdb-password

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the influxdb user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing InfluxDB.
service:
  type: ClusterIP
  port: 8086
  portName: http

# Ingress is not applicable to this database and stays disabled.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Autoscaling is not supported for a single instance and stays disabled.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# InfluxDB 2.x exposes a native Prometheus endpoint at /metrics on the HTTP port,
# so no exporter sidecar is required. Enabling this scrapes that path through the
# ServiceMonitor.
metrics:
  enabled: false
  # Path the Prometheus endpoint is served on.
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS. InfluxDB 2.x serves the HTTP API and UI over TLS when the
# tls-cert and tls-key options are set (INFLUXD_TLS_CERT / INFLUXD_TLS_KEY). When
# enabled this chart mounts the certificate Secret and wires those variables.
tls:
  enabled: false
  # Secret containing the certificate and key files.
  existingSecret: ""
  certFilename: tls.crt
  keyFilename: tls.key
  # Directory the certificate files are mounted into.
  mountPath: /etc/influxdb/certs

# Native influxd configuration applied as INFLUXD_ environment variables. Keys
# are the influxd config option names, for example { query-concurrency: "20",
# storage-cache-max-memory-size: "1073741824" }.
parameters: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Persistent storage for the InfluxDB data directory.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/lib/influxdb2

# Image used by the helm test connection check. Defaults to the server image.
tests:
  image: docker.io/library/influxdb:2.7
