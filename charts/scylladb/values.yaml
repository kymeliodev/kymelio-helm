# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/scylladb/scylla
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload.
service:
  type: ClusterIP
  port: 9042
  portName: cql

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1
    memory: 2Gi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# ScyllaDB serves Prometheus metrics natively on metrics.port at the /metrics path.
# Enabling this exposes the port on the container and Service.
metrics:
  enabled: false
  # Native Prometheus listener port (scylla prometheus_port).
  port: 9180
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS for client (CQL) connections. When enabled the settings are
# rendered into the mounted scylla.yaml fragment and the certificate Secret is
# mounted read only.
tls:
  enabled: false
  # Secret containing the certificate, key and optional CA files.
  existingSecret: ""
  # Mount path for the TLS material inside the container.
  mountPath: /etc/scylla/certs
  certFilename: tls.crt
  keyFilename: tls.key

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# ScyllaDB native configuration.
scylla:
  # Native scylla.yaml tuning. When set (or when tls.enabled is true) the fragment
  # is rendered into a ConfigMap and mounted at scylla.configFragmentMountPath.
  # Use this for server settings such as compaction throughput, authenticator or
  # client_encryption_options.
  # Example: |
  #   authenticator: PasswordAuthenticator
  #   authorizer: CassandraAuthorizer
  configFragment: ""
  # File name used for the rendered scylla.yaml fragment.
  configFragmentFileName: scylla.yaml
  # Mount path for the rendered scylla.yaml fragment.
  configFragmentMountPath: /etc/scylla-extra

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/lib/scylla

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
