# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/longhornio/longhorn-manager
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
# Documented exception: the Longhorn manager requires host access to manage
# node disks, mounts and the iSCSI stack, so it runs as root (UID 0) and cannot
# enforce runAsNonRoot. This is an intentional deviation from the hardened
# baseline used by the other charts in this repository.
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
# Documented exception: privileged access is required so the manager can attach
# and detach volumes on the host. runAsNonRoot is disabled for the same reason.
securityContext:
  privileged: true
  runAsNonRoot: false
  runAsUser: 0
  # Kept false because the manager writes to host paths at runtime.
  readOnlyRootFilesystem: false

# Role based access control for the manager service account.
rbac:
  create: true

# Command and arguments for the Longhorn manager process.
command:
  - longhorn-manager
args:
  - -d
  - daemon
  - --engine-image
  - longhornio/longhorn-engine:v1.7.0
  - --manager-image
  - longhornio/longhorn-manager:v1.7.0

# Service exposing the workload.
service:
  type: ClusterIP
  port: 9500
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra environment variables passed to the container.
extraEnv: []

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36
