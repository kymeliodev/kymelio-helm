# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.io/longhornio/longhorn-manager
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
# Documented exception: the Longhorn manager requires host access to manage
# node disks, mounts and the iSCSI stack, so it runs as root (UID 0) and cannot
# enforce runAsNonRoot. This is an intentional deviation from the hardened
# baseline used by the other charts in this repository.
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
# Documented exception: privileged access is required so the manager can attach
# and detach volumes on the host. runAsNonRoot is disabled for the same reason.
securityContext:
  privileged: true
  runAsNonRoot: false
  runAsUser: 0
  # Kept false because the manager writes to host paths at runtime.
  readOnlyRootFilesystem: false

# Role based access control for the manager service account.
rbac:
  create: true

# Command and arguments for the Longhorn manager process.
command:
  - longhorn-manager
args:
  - -d
  - daemon
  - --engine-image
  - longhornio/longhorn-engine:v1.7.0
  - --manager-image
  - longhornio/longhorn-manager:v1.7.0

# Service exposing the workload.
service:
  type: ClusterIP
  port: 9500
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  # The longhorn-manager exposes Prometheus metrics at /metrics on the manager
  # port (9500). Enabling this points the ServiceMonitor at that path.
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Extra manager flags applied as --key=value on startup.
# Example: { upgrade-version-check: "false" }
parameters: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# OpenShift Route exposing the service externally. Disabled by default.
route:
  enabled: false
  host: ""
  # Target service port name or number. Leave empty for single port services.
  port: ""
  annotations: {}
  # TLS configuration, for example { termination: edge }.
  tls: {}
  wildcardPolicy: None

# OpenShift compatibility. When enabled, the explicit runAsUser, runAsGroup and
# fsGroup are omitted so the restricted SCC assigns them from the namespace range.
openShift:
  enabled: false
