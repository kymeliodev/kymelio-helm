{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "longhorn.fullname" . }}
  labels:
    {{- include "longhorn.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - events
      - persistentvolumes
      - persistentvolumeclaims
      - nodes
      - secrets
      - services
      - endpoints
      - configmaps
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - statefulsets
      - deployments
    verbs: ["*"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
      - csinodes
      - csidrivers
    verbs: ["*"]
  - apiGroups: ["longhorn.io"]
    resources:
      - "*"
    verbs: ["*"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "longhorn.fullname" . }}
  labels:
    {{- include "longhorn.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "longhorn.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "longhorn.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
