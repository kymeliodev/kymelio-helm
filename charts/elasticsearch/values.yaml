# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.elastic.co/elasticsearch/elasticsearch
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the workload. Both the HTTP API and transport ports.
service:
  type: ClusterIP
  # Primary HTTP API port used by ingress, probes and the connection test.
  http:
    port: 9200
    portName: http
  # Transport port used for node to node communication.
  transport:
    port: 9300
    portName: transport

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# Elasticsearch has no built in Prometheus endpoint, so this runs a community
# elasticsearch_exporter sidecar that scrapes the local node over HTTP.
metrics:
  enabled: false
  image:
    repository: quay.io/prometheuscommunity/elasticsearch-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  # Port the exporter listens on and exposes through the Service.
  port: 9114
  # URI the exporter uses to reach the local Elasticsearch node.
  esUri: http://127.0.0.1:9200
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Native Elasticsearch configuration rendered into elasticsearch.yml and mounted
# at /usr/share/elasticsearch/config/elasticsearch.yml. Use this for settings such
# as xpack.security.http.ssl.* to enable HTTP TLS. Leave empty to keep defaults.
elasticsearchConfig: ""

# HTTP layer TLS. When enabled, the named Secret is mounted and the chart wires
# the certificate and key into the elasticsearch.yml HTTP SSL settings.
# Provide a complete elasticsearchConfig with the matching xpack settings, or set
# the file names here and add the xpack.security.http.ssl block via elasticsearchConfig.
tls:
  enabled: false
  # Secret containing the certificate and private key in PEM format.
  existingSecret: ""
  certFilename: tls.crt
  keyFilename: tls.key
  # Mount path for the certificate Secret inside the container.
  mountPath: /usr/share/elasticsearch/config/certs

# Extra environment variables appended to the container env. The chart already
# sets discovery.type, xpack.security.enabled and ES_JAVA_OPTS.
extraEnv: []

# Heap and JVM options applied through ES_JAVA_OPTS.
esJavaOpts: "-Xms512m -Xmx512m"

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /usr/share/elasticsearch/data
