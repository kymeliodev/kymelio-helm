apiVersion: v1
kind: Service
metadata:
  name: {{ include "emqx.fullname" . }}
  labels:
    {{- include "emqx.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.mqtt.port }}
      targetPort: {{ .Values.service.mqtt.portName }}
      protocol: TCP
      name: {{ .Values.service.mqtt.portName }}
    - port: {{ .Values.service.dashboard.port }}
      targetPort: {{ .Values.service.dashboard.portName }}
      protocol: TCP
      name: {{ .Values.service.dashboard.portName }}
  selector:
    {{- include "emqx.selectorLabels" . | nindent 4 }}
