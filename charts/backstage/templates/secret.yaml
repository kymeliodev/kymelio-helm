{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backstage.fullname" . }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.secretKeys.postgresPasswordKey }}: {{ include "backstage.postgresPassword" . | b64enc | quote }}
  {{ .Values.secretKeys.backendSecretKey }}: {{ include "backstage.backendSecret" . | b64enc | quote }}
{{- end }}
