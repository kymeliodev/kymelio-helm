apiVersion: v1
kind: Service
metadata:
  name: {{ include "redpanda.fullname" . }}
  labels:
    {{- include "redpanda.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.kafka.port }}
      targetPort: {{ .Values.service.kafka.portName }}
      protocol: TCP
      name: {{ .Values.service.kafka.portName }}
    - port: {{ .Values.service.admin.port }}
      targetPort: {{ .Values.service.admin.portName }}
      protocol: TCP
      name: {{ .Values.service.admin.portName }}
  selector:
    {{- include "redpanda.selectorLabels" . | nindent 4 }}
