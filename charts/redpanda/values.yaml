# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: docker.redpanda.com/redpandadata/redpanda
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the redpanda user shipped in the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  # Set to true for images that tolerate an immutable root filesystem.
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing the broker. The Kafka API and admin API are published.
# Redpanda serves Prometheus metrics on the admin port, so no extra service port
# is required when metrics are enabled.
service:
  type: ClusterIP
  kafka:
    port: 9092
    portName: kafka
  admin:
    port: 9644
    portName: admin

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
# Redpanda exposes Prometheus metrics on the admin API port (9644) under two
# paths: /public_metrics (curated, low cardinality, redpanda_ prefix) and
# /metrics (detailed, vectorized_ prefix). No exporter sidecar is required;
# enabling metrics wires the ServiceMonitor to the admin port and the path below.
metrics:
  enabled: false
  # Path the admin API serves metrics on. Use /public_metrics for the curated
  # set or /metrics for the full detailed set.
  path: /public_metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

# Server side TLS for the Kafka API. Redpanda enables TLS through its native
# redpanda.yaml configuration (the kafka_api_tls section). When enabled this
# chart mounts the certificate Secret and passes the matching redpanda config
# overrides as start flags so the Kafka API serves TLS.
tls:
  enabled: false
  # Secret containing ca.crt, tls.crt and tls.key.
  existingSecret: ""
  caFilename: ca.crt
  certFilename: tls.crt
  keyFilename: tls.key
  # Directory the certificate files are mounted into.
  mountPath: /etc/redpanda/certs
  # Require and verify client certificates (mutual TLS).
  requireClientAuth: false

# Native Redpanda configuration applied to redpanda.yaml. Each key/value pair is
# passed as a `--set redpanda.<key>=<value>` start flag, which the broker writes
# into its configuration before start. Use this for broker tuning, for example
# { "default_topic_replications": "1", "auto_create_topics_enabled": "true" }.
redpandaConf: {}

# Extra environment variables passed to the container.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36

# Persistent storage for the StatefulSet.
persistence:
  enabled: true
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  mountPath: /var/lib/redpanda/data
