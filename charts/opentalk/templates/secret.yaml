{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opentalk.fullname" . }}
  labels:
    {{- include "opentalk.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.secretKeys.serviceKey }}: {{ include "opentalk.serviceKey" . | b64enc | quote }}
{{- end }}
