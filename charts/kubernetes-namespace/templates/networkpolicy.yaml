{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.namespace.name }}-default-deny
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "kubernetes-namespace.labels" . | nindent 4 }}
spec:
  # An empty podSelector matches every pod in the namespace. With no ingress or
  # egress rules listed, all traffic is denied until explicit allow policies are
  # added alongside this one.
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- end }}
