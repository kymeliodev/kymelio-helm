# Number of replicas. Ignored when autoscaling is enabled.
replicaCount: 1

# Container image configuration.
image:
  repository: quay.io/keycloak/keycloak
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty. Never use a floating tag.
  tag: ""

# Image pull secrets for private registries.
imagePullSecrets: []

# Override the chart name used in resource names.
nameOverride: ""
# Override the fully qualified resource name.
fullnameOverride: ""

# Admin user and credentials for the initial Keycloak account.
auth:
  # Initial admin user created on first start.
  adminUser: admin
  # Admin password. A random password is generated when left empty.
  adminPassword: ""
  # Use an existing Secret instead of managing credentials in this chart.
  existingSecret: ""
  secretKeys:
    # Key inside the Secret that holds the admin password.
    passwordKey: admin-password

# Run mode. Development mode (start-dev) is used by default so the chart
# installs without an external database. Set true for a hardened start, which
# requires database and hostname configuration supplied via extraEnv.
production: false

# Service account used by the workload.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Annotations added to the pod.
podAnnotations: {}

# Pod level security context. Matches the uid shipped in the Keycloak image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# Service exposing Keycloak.
service:
  type: ClusterIP
  port: 8080
  portName: http

# Ingress configuration. Disabled by default.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requests and limits. Keycloak runs on the JVM and needs headroom.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Horizontal pod autoscaler. Disabled by default.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Pod disruption budget. Disabled by default.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy. Disabled by default.
networkPolicy:
  enabled: false
  ingress: []

# Prometheus integration. Disabled by default.
metrics:
  # Enable the built-in Micrometer metrics endpoint. Keycloak serves Prometheus
  # metrics at /metrics on the management interface (port 9000) when
  # KC_METRICS_ENABLED is true. The management interface is already active
  # because health checks are enabled.
  enabled: false
  # Management interface port that exposes /metrics and /health.
  port: 9000
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # Path of the Prometheus metrics endpoint on the management port.
    path: /metrics

# Server side TLS. Keycloak terminates TLS itself when enabled, reading a PEM
# certificate and key from a mounted Secret via KC_HTTPS_CERTIFICATE_FILE and
# KC_HTTPS_CERTIFICATE_KEY_FILE. The HTTPS port is added to the container and
# Service.
tls:
  enabled: false
  # Secret containing the certificate and key files.
  existingSecret: ""
  certFilename: tls.crt
  keyFilename: tls.key
  # HTTPS port served by Keycloak.
  port: 8443
  # Mount path for the certificate files inside the container.
  mountPath: /opt/keycloak/conf/tls

# Extra environment variables passed to the container. Production mode requires
# database and hostname settings here, for example KC_DB, KC_DB_URL,
# KC_DB_USERNAME, KC_DB_PASSWORD and KC_HOSTNAME.
extraEnv: []

# Extra command line arguments appended to the container entrypoint.
extraArgs: []

# Extra environment variables sourced from ConfigMaps or Secrets (envFrom).
extraEnvFrom: []

# Inline application configuration. When set it is rendered into a ConfigMap and
# mounted at configMountPath. Use this for native config files like an app.conf.
configuration: ""
# File name for the rendered configuration inside the mount path.
configFileName: app.conf
# Mount path for the configuration.
configMountPath: /config
# Mount the configuration as a single file using subPath. Leave empty to mount
# the whole ConfigMap as a directory.
configSubPath: ""
# Use an existing ConfigMap for the configuration instead of rendering one.
existingConfigMap: ""

# Additional volumes and mounts for the workload.
extraVolumes: []
extraVolumeMounts: []

# Additional init containers and sidecar containers.
initContainers: []
sidecars: []

# Extra labels added to the pod template.
podLabels: {}
# Pod priority class.
priorityClassName: ""

# Free form configuration rendered into a ConfigMap when not empty.
config: {}

# Node scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}

# Image used by the helm test connection check.
tests:
  image: busybox:1.36
