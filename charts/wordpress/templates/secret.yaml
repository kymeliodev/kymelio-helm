{{- if not .Values.externalDatabase.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wordpress.fullname" . }}
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.externalDatabase.secretKeys.passwordKey }}: {{ include "wordpress.password" . | b64enc | quote }}
{{- end }}
